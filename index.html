<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Registro de Entrada - Centro de Investigación</title>
    <!-- Vinculación al archivo de estilos profesional -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-wrapper">
    <!-- SECCIÓN FORMULARIO DE REGISTRO -->
    <div class="card-container" id="userFormSection">
        <div class="card-header">
            <h2>Registro de Entrada</h2>
            <p>Control de acceso al Centro de Investigación</p>
        </div>
        
        <form id="registrationForm" class="styled-form">
            <div class="form-group">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" placeholder="Ej. César Manríquez" required>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="institucion">Institución / Empresa</label>
                    <input type="text" id="institucion" placeholder="Organización de procedencia" required>
                </div>
                <div class="form-group">
                    <label for="cargo">Cargo</label>
                    <input type="text" id="cargo" placeholder="Puesto que desempeña" required>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="motivo">Motivo de la Visita</label>
                    <input type="text" id="motivo" placeholder="Ej. Reunión técnica, Auditoría" required>
                </div>
                <div class="form-group">
                    <label for="receptor">Quién Recibe</label>
                    <input type="text" id="receptor" placeholder="Nombre del anfitrión o área" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="email">Correo Electrónico Corporativo</label>
                <input type="email" id="email" placeholder="usuario@institucion.cl" required>
            </div>
            
            <button type="submit" id="submitBtn" class="primary-btn">Confirmar Ingreso</button>
            <div class="notification-box" id="responseMessage"></div>
        </form>
        
        <div class="card-footer">
            <button class="text-link-btn" id="goToAdminBtn">⚙️ Acceso Administrador</button>
        </div>
    </div>

    <!-- SECCIÓN PANEL DE ADMINISTRACIÓN -->
    <div class="card-container admin-container" id="adminSection">
        <div class="card-header admin-header">
            <h2>Panel de Control</h2>
            <p>Historial de ingresos autorizados en tiempo real</p>
        </div>
        
        <div class="admin-meta">
            <span class="badge" id="totalVisits">Total Visitantes: 0</span>
            <button class="secondary-btn" id="backToFormBtn">Volver al Registro</button>
        </div>
        
        <div class="table-responsive">
            <table id="adminTable">
                <thead>
                    <tr>
                        <th>Fecha / Hora</th>
                        <th>Nombre</th>
                        <th>Institución</th>
                        <th>Cargo</th>
                        <th>Motivo</th>
                        <th>Quién Recibe</th>
                        <th>E-mail</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Filas dinámicas de Google Sheets -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- CRÉDITOS DE AUTORÍA DEL WEBMASTER -->
    <footer class="webmaster-footer">
        <p>Desarrollado por el Webmaster <strong>César Manríquez</strong> &copy; 2026</p>
    </footer>
</div>

<script>
    // URL ÚNICA DE CONEXIÓN CON GOOGLE DRIVE
    const WEB_APP_URL = 'https://google.com'; 
    const ADMIN_PASSWORD = '123'; 

    const form = document.getElementById('registrationForm');
    const msg = document.getElementById('responseMessage');
    const btn = document.getElementById('submitBtn');

    // --- LOGICA DE ENVÍO DE DATOS ---
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = 'Procesando...';
        msg.className = 'notification-box info';
        msg.style.display = 'block';
        msg.innerText = 'Validando credenciales y guardando registro...';

        const payload = {
            fecha: new Date().toLocaleString('es-ES'),
            nombre: document.getElementById('nombre').value,
            institucion: document.getElementById('institucion').value,
            cargo: document.getElementById('cargo').value,
            motivo: document.getElementById('motivo').value,
            receptor: document.getElementById('receptor').value,
            email: document.getElementById('email').value
        };

        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors', 
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify(payload)
        }).then(() => {
            msg.className = 'notification-box success';
            msg.innerText = '¡Acceso registrado y autorizado con éxito!';
            form.reset();
            setTimeout(() => { msg.style.display = 'none'; }, 4000);
        }).catch(err => {
            msg.className = 'notification-box error';
            msg.innerText = 'Error crítico de comunicación con el servidor.';
            console.error(err);
        }).finally(() => {
            btn.disabled = false;
            btn.innerText = 'Confirmar Ingreso';
        });
    });

    // --- LOGICA DEL PANEL ADMINISTRATIVO ---
    const userFormSection = document.getElementById('userFormSection');
    const adminSection = document.getElementById('adminSection');
    const adminTableBody = document.querySelector('#adminTable tbody');

    document.getElementById('goToAdminBtn').addEventListener('click', function() {
        const passwordInput = prompt('Autenticación Requerida.\nIngrese contraseña de Administrador:');
        if (passwordInput === ADMIN_PASSWORD) {
            userFormSection.style.display = 'none';
            adminSection.style.display = 'block';
            loadAdminData();
        } else if (passwordInput !== null) {
            alert('Acceso denegado. Contraseña incorrecta.');
        }
    });

    document.getElementById('backToFormBtn').addEventListener('click', function() {
        adminSection.style.display = 'none';
        userFormSection.style.display = 'block';
    });

    function loadAdminData() {
        adminTableBody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 25px; color: #64748b;">Consultando base de datos segura en Drive...</td></tr>';
        
        fetch(`${WEB_APP_URL}?action=read`)
        .then(res => res.json())
        .then(records => {
            adminTableBody.innerHTML = '';
            document.getElementById('totalVisits').innerText = `Total Visitantes: ${records.length}`;

            if(records.length === 0) {
                adminTableBody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 25px;">No existen registros de entrada previos.</td></tr>';
                return;
            }
            records.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${row.fecha}</strong></td>
                    <td>${row.nombre}</td>
                    <td>${row.institucion}</td>
                    <td>${row.cargo}</td>
                    <td>${row.motivo}</td>
                    <td>${row.receptor}</td>
                    <td><a href="mailto:${row.email}" style="color:#3b82f6; text-decoration:none;">${row.email}</a></td>
                `;
                adminTableBody.appendChild(tr);
            });
        }).catch(err => {
            adminTableBody.innerHTML = '<tr><td colspan="7" style="text-align:center; color:#ef4444; font-weight:600; padding: 25px;">Error: No se pudo verificar la base de datos de Google.</td></tr>';
            console.error(err);
        });
    }
</script>
</body>
</html>
