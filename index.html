<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Acceso Móvil - Centro de Investigación</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-wrapper">
    <!-- RECUADRO DEL FORMULARIO -->
    <div class="card-container" id="userFormSection">
        <div class="card-header">
            <h2>Registro de Entrada</h2>
            <p>Control de acceso escaneado por QR</p>
        </div>
        
        <form id="registrationForm" class="styled-form" autocomplete="off">
            <div class="form-group">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" placeholder="Ej. César Manríquez" autocapitalize="words" required>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="institucion">Institución / Empresa</label>
                    <input type="text" id="institucion" placeholder="Procedencia" required>
                </div>
                <div class="form-group">
                    <label for="cargo">Cargo</label>
                    <input type="text" id="cargo" placeholder="Puesto que desempeña" required>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="motivo">Motivo de la Visita</label>
                    <input type="text" id="motivo" placeholder="Ej. Reunión, Auditoría" required>
                </div>
                <div class="form-group">
                    <label for="receptor">Quién Recibe</label>
                    <input type="text" id="receptor" placeholder="Persona o área" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" placeholder="nombre@empresa.com" inputmode="email" required>
            </div>
            
            <button type="submit" id="submitBtn" class="primary-btn">Confirmar Ingreso</button>
            <div class="notification-box" id="responseMessage"></div>
        </form>
        
        <div class="card-footer">
            <button class="text-link-btn" id="goToAdminBtn">⚙️ Acceso Administrador</button>
        </div>
    </div>

    <!-- RECUADRO DEL PANEL ADMINISTRADOR (Blindado con bloqueo visual por defecto) -->
    <div class="card-container admin-container" id="adminSection">
        <div class="card-header admin-header">
            <h2>Panel de Control</h2>
            <p>Historial de ingresos autorizados en tiempo real</p>
        </div>
        
        <div class="admin-meta">
            <span class="badge" id="totalVisits">Total: 0</span>
            <button class="secondary-btn" id="backToFormBtn">Volver</button>
        </div>
        
        <div class="table-responsive">
            <table id="adminTable">
                <thead>
                    <tr>
                        <th>Fecha / Hora</th>
                        <th>Nombre</th>
                        <th>Institución</th>
                        <th>Cargo</th>
                        <th>Motivo</th>
                        <th>Recibe</th>
                        <th>E-mail</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <!-- CRÉDITOS DE AUTORÍA -->
    <footer class="webmaster-footer">
        <p>Optimizado para Android e iOS por el Webmaster <strong>César Manríquez</strong> &copy; 2026</p>
    </footer>
</div>

<script>
    const WEB_APP_URL = 'https://google.com'; 
    const ADMIN_PASSWORD = '123'; 

    const form = document.getElementById('registrationForm');
    const msg = document.getElementById('responseMessage');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = 'Procesando...';
        msg.className = 'notification-box info';
        msg.style.display = 'block';
        msg.innerText = 'Guardando registro de acceso...';

        const payload = {
            fecha: new Date().toLocaleString('es-ES'),
            nombre: document.getElementById('nombre').value,
            institucion: document.getElementById('institucion').value,
            cargo: document.getElementById('cargo').value,
            motivo: document.getElementById('motivo').value,
            receptor: document.getElementById('receptor').value,
            email: document.getElementById('email').value
        };

        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors', 
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify(payload)
        }).then(() => {
            msg.className = 'notification-box success';
            msg.innerText = '¡Ingreso autorizado con éxito!';
            form.reset();
            setTimeout(() => { msg.style.display = 'none'; }, 4000);
        }).catch(err => {
            msg.className = 'notification-box error';
            msg.innerText = 'Error de conexión móvil.';
            console.error(err);
        }).finally(() => {
            btn.disabled = false;
            btn.innerText = 'Confirmar Ingreso';
        });
    });

    const userFormSection = document.getElementById('userFormSection');
    const adminSection = document.getElementById('adminSection');
    const adminTableBody = document.querySelector('#adminTable tbody');

    document.getElementById('goToAdminBtn').addEventListener('click', function() {
        const passwordInput = prompt('Autenticación Requerida.\nContraseña de Administrador:');
        if (passwordInput === ADMIN_PASSWORD) {
            userFormSection.style.display = 'none';
            adminSection.style.setProperty('display', 'block', 'important'); // Desbloquea visualmente con prioridad interna
            loadAdminData();
        } else if (passwordInput !== null) {
            alert('Contraseña incorrecta.');
        }
    });

    document.getElementById('backToFormBtn').addEventListener('click', function() {
        adminSection.style.setProperty('display', 'none', 'important'); // Vuelve a ocultar estrictamente
        userFormSection.style.display = 'block';
    });

    function loadAdminData() {
        adminTableBody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:20px; color:#64748b;">Cargando base de datos segura...</td></tr>';
        
        fetch(`${WEB_APP_URL}?action=read`)
        .then(res => res.json())
        .then(records => {
            adminTableBody.innerHTML = '';
            document.getElementById('totalVisits').innerText = `Total: ${records.length}`;

            if(records.length === 0) {
                adminTableBody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:20px;">Sin visitas registradas hoy.</td></tr>';
                return;
            }
            records.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${row.fecha}</strong></td>
                    <td>${row.nombre}</td>
                    <td>${row.institucion}</td>
                    <td>${row.cargo}</td>
                    <td>${row.motivo}</td>
                    <td>${row.receptor}</td>
                    <td><a href="mailto:${row.email}">${row.email}</a></td>
                `;
                adminTableBody.appendChild(tr);
            });
        }).catch(err => {
            adminTableBody.innerHTML = '<tr><td colspan="7" style="text-align:center; color:#ef4444; padding:20px;">Error al conectar con Drive.</td></tr>';
            console.error(err);
        });
    }
</script>
</body>
</html>
